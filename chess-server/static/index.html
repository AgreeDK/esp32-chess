<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>esp32-chess — testklient</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0e0e0e;
    --surface:   #1a1a1a;
    --border:    #2e2e2e;
    --accent:    #39ff14;
    --accent-dim:#1a7a06;
    --text:      #e0e0e0;
    --muted:     #666;
    --error:     #ff4444;
    --warn:      #ffaa00;
    --sq-light:  #c8c8c8;
    --sq-dark:   #4a4a4a;
    --sq-from:   rgba(57,255,20,0.45);
    --sq-to:     rgba(57,255,20,0.65);
    --sq-sel:    rgba(57,255,20,0.3);
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; }

  body { display: grid; grid-template-columns: 220px 1fr 240px; grid-template-rows: auto 1fr auto; min-height: 100vh; }

  header {
    grid-column: 1/-1; padding: 14px 28px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px; background: var(--surface);
  }
  header h1 { font-family: 'Share Tech Mono', monospace; font-size: 1.1rem; letter-spacing: .08em; color: var(--accent); }
  header h1 span { color: var(--muted); }

  #status-pill {
    margin-left: auto; padding: 4px 12px; border-radius: 2px;
    font-family: 'Share Tech Mono', monospace; font-size: .75rem; letter-spacing: .1em;
    background: var(--border); color: var(--muted); border: 1px solid var(--border); transition: all .2s;
  }
  #status-pill.connected, #status-pill.playing { color: var(--accent); border-color: var(--accent-dim); background: #0d2200; }
  #status-pill.error   { color: var(--error); border-color: #500; background: #200; }
  #status-pill.gameover{ color: var(--warn);  border-color: #553300; background: #221100; }

  /* Panels */
  #left-panel  { padding: 24px 16px; border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; }
  #right-panel { padding: 24px 16px; border-left:  1px solid var(--border); display: flex; flex-direction: column; gap: 16px; }

  .panel-label { font-family: 'Share Tech Mono', monospace; font-size: .7rem; letter-spacing: .15em; color: var(--muted); text-transform: uppercase; margin-bottom: 8px; }

  .info-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
  .info-row span:last-child { font-family: 'Share Tech Mono', monospace; color: var(--accent); font-size: .8rem; }

  /* Board wrap */
  #board-wrap { padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; }

  /* Chess board */
  #chess-board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 2px solid var(--border); user-select: none; }

  .sq {
    width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; position: relative; transition: background .1s;
  }
  .sq.light { background: var(--sq-light); }
  .sq.dark  { background: var(--sq-dark); }
  .sq.highlight-from { background: var(--sq-from) !important; }
  .sq.highlight-to   { background: var(--sq-to)   !important; }
  .sq.selected       { background: var(--sq-sel)   !important; }
  .sq.legal-move::after {
    content: ''; position: absolute;
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(57,255,20,0.4);
    pointer-events: none;
  }

  .piece { width: 54px; height: 54px; pointer-events: none; }

  /* Koordinater */
  .coord-file { display: flex; width: 480px; justify-content: space-around; padding: 2px 0; }
  .coord-file span { width: 60px; text-align: center; font-family: 'Share Tech Mono', monospace; font-size: .7rem; color: var(--muted); }
  .coord-rank { position: absolute; left: 3px; top: 2px; font-family: 'Share Tech Mono', monospace; font-size: .65rem; color: var(--muted); pointer-events: none; }

  #turn-bar {
    width: 480px; padding: 10px 16px; background: var(--surface); border: 1px solid var(--border);
    font-family: 'Share Tech Mono', monospace; font-size: .85rem; letter-spacing: .08em;
    text-align: center; color: var(--muted); transition: all .3s;
  }
  #turn-bar.your-turn  { color: var(--accent); border-color: var(--accent-dim); }
  #turn-bar.gameover   { color: var(--warn);   border-color: #553300; }

  /* Buttons */
  .btn {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: .8rem;
    letter-spacing: .08em; cursor: pointer; transition: all .15s; text-align: left;
  }
  .btn:hover  { border-color: var(--accent); color: var(--accent); background: #0d2200; }
  .btn:disabled { opacity: .3; cursor: not-allowed; }
  .btn.primary { border-color: var(--accent-dim); color: var(--accent); background: #0d2200; }
  .btn.danger  { border-color: #500; color: var(--error); }
  .btn.danger:hover { background: #200; }

  .slider-wrap { display: flex; flex-direction: column; gap: 6px; }
  input[type=range] { width: 100%; accent-color: var(--accent); }
  .slider-val { font-family: 'Share Tech Mono', monospace; font-size: .75rem; color: var(--accent); text-align: right; }

  #log { flex: 1; overflow-y: auto; font-family: 'Share Tech Mono', monospace; font-size: .72rem; line-height: 1.7; color: var(--muted); padding: 8px; background: #111; border: 1px solid var(--border); max-height: 340px; }
  #log .ep { color: var(--accent); }
  #log .ea { color: #7bf; }
  #log .es { color: var(--muted); }
  #log .ee { color: var(--error); }
  #log .er { color: var(--warn); }

  footer { grid-column: 1/-1; padding: 8px 28px; border-top: 1px solid var(--border); background: var(--surface); font-family: 'Share Tech Mono', monospace; font-size: .7rem; color: var(--muted); display: flex; gap: 24px; }
  footer span { color: var(--accent); }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
</style>
</head>
<body>

<header>
  <h1>esp32-chess <span>// browser testklient</span></h1>
  <div id="status-pill">AFBRUDT</div>
</header>

<div id="left-panel">
  <div>
    <div class="panel-label">Spilinfo</div>
    <div class="info-row"><span>Game ID</span><span id="info-gameid">—</span></div>
    <div class="info-row"><span>Tur nr.</span><span id="info-move">—</span></div>
    <div class="info-row"><span>Du spiller</span><span id="info-color">HVID</span></div>
    <div class="info-row"><span>Skill</span><span id="info-skill">10</span></div>
  </div>
  <div>
    <div class="panel-label">FEN</div>
    <div id="info-fen" style="font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--muted);word-break:break-all;line-height:1.5;">—</div>
  </div>
</div>

<div id="board-wrap">
  <div class="coord-file" id="files-top"></div>
  <div style="display:flex;gap:0;">
    <div style="display:flex;flex-direction:column;justify-content:space-around;padding:0 4px;">
      <span id="ranks-left" style="display:contents;"></span>
    </div>
    <div id="chess-board"></div>
  </div>
  <div class="coord-file" id="files-bottom"></div>
  <div id="turn-bar">Opret et nyt spil for at starte</div>
</div>

<div id="right-panel">
  <div>
    <div class="panel-label">Kontroller</div>
    <div class="slider-wrap" style="margin-bottom:12px;">
      <label style="font-size:.78rem;color:var(--muted);">Stockfish sværhedsgrad</label>
      <input type="range" id="skill-slider" min="0" max="20" value="10">
      <div class="slider-val">Niveau <span id="skill-val">10</span> / 20</div>
    </div>
    <button class="btn primary" id="btn-new">▶ Nyt spil</button>
    <button class="btn" id="btn-flip" style="margin-top:6px;">⇅ Vend brættet</button>
    <button class="btn danger" id="btn-resign" style="margin-top:6px;" disabled>✕ Opgiv</button>
  </div>
  <div style="flex:1;display:flex;flex-direction:column;min-height:0;">
    <div class="panel-label">Træk-log</div>
    <div id="log"></div>
  </div>
</div>

<footer>
  <div>SERVER ws://localhost:8000/ws</div>
  <div>MAC <span>aa:bb:cc:dd:ee:ff</span></div>
  <div>MODE <span>vs_stockfish</span></div>
</footer>

// FEN piece char → SVG nøgle
const FEN_TO_KEY = {
  K:'wK', Q:'wQ', R:'wR', B:'wB', N:'wN', P:'wP',
  k:'bK', q:'bQ', r:'bR', b:'bB', n:'bN', p:'bP',
};

// ── State ─────────────────────────────────────────────────────────────────────
const WS_URL = `ws://${location.hostname}:8000/ws`;
const MAC    = "aa:bb:cc:dd:ee:ff";

let ws          = null;
let gameId      = null;
let currentFen  = "rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1";
let currentTurn = "white";
let gameOver    = false;
let flipped     = false;
let selected    = null;   // felt-navn fx "e2"
let lastFrom    = null;
let lastTo      = null;
let grid        = {};     // felt-navn → piece char (fra FEN)

// ── FEN parser ────────────────────────────────────────────────────────────────
function fenToGrid(fen) {
  const g = {};
  const fenBoard = fen.split(" ")[0];
  fenBoard.split("/").forEach((row, ri) => {
    const rank = 8 - ri;
    let file = 0;
    for (const ch of row) {
      if (/\d/.test(ch)) { file += parseInt(ch); }
      else {
        g["abcdefgh"[file] + rank] = ch;
        file++;
      }
    }
  });
  return g;
}

// ── Board rendering ───────────────────────────────────────────────────────────
function renderBoard() {
  const boardEl = document.getElementById("chess-board");
  boardEl.innerHTML = "";

  const files = flipped ? [7,6,5,4,3,2,1,0] : [0,1,2,3,4,5,6,7];
  const ranks = flipped ? [0,1,2,3,4,5,6,7] : [7,6,5,4,3,2,1,0];

  for (const rank of ranks) {
    for (const file of files) {
      const name = "abcdefgh"[file] + (rank + 1);
      const sq   = document.createElement("div");
      sq.className = "sq " + ((file + rank) % 2 === 0 ? "dark" : "light");
      sq.dataset.name = name;

      // Rang-label
      if ((!flipped && file === 0) || (flipped && file === 7)) {
        const coord = document.createElement("span");
        coord.className = "coord-rank";
        coord.textContent = rank + 1;
        sq.appendChild(coord);
      }

      if (name === lastFrom) sq.classList.add("highlight-from");
      if (name === lastTo)   sq.classList.add("highlight-to");
      if (name === selected) sq.classList.add("selected");

      const piece = grid[name];
      if (piece) {
        const svg = document.createElement("div");
        svg.className = "piece";
        svg.innerHTML = PIECES[FEN_TO_KEY[piece]] || "";
        sq.appendChild(svg);
      }

      sq.addEventListener("click", () => onSquareClick(name));
      boardEl.appendChild(sq);
    }
  }

  // Fil-labels
  const fileLabels = flipped
    ? ["h","g","f","e","d","c","b","a"]
    : ["a","b","c","d","e","f","g","h"];
  ["files-top","files-bottom"].forEach(id => {
    document.getElementById(id).innerHTML =
      fileLabels.map(f => `<span>${f}</span>`).join("");
  });
}

// ── Klik-håndtering (ingen chess.js — serveren validerer) ─────────────────────
function onSquareClick(name) {
  console.log(`KLIK: ${name} | gameId=${gameId} | gameOver=${gameOver} | turn=${currentTurn} | piece=${grid[name]}`);
  if (!gameId || gameOver) { console.log("BLOKERET: ingen gameId eller gameOver"); return; }
  if (currentTurn !== "white") { console.log("BLOKERET: ikke din tur"); return; }

  const piece = grid[name];
  const isOwnPiece = piece && piece === piece.toUpperCase(); // hvid = stort bogstav
  console.log(`piece="${piece}" isOwnPiece=${isOwnPiece} selected=${selected}`);

  if (selected === null) {
    if (isOwnPiece) {
      selected = name;
      renderBoard();
    }
  } else {
    if (name === selected) {
      // Afvælg
      selected = null;
      renderBoard();
      return;
    }

    if (isOwnPiece) {
      // Skift valg til anden brik
      selected = name;
      renderBoard();
      return;
    }

    // Send træk til server — serveren afgør om det er lovligt
    const from = selected;
    selected = null;
    lastFrom = from;
    lastTo   = name;
    renderBoard();
    log(`Du: ${from} → ${name}`, "ep");
    ws.send(JSON.stringify({ type: "move", from, to: name, game_id: gameId }));
  }
}

// ── Hjælpefunktioner ──────────────────────────────────────────────────────────
function log(msg, cls = "es") {
  const div = document.getElementById("log");
  const line = document.createElement("div");
  line.className = cls;
  line.textContent = msg;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

function setStatus(text, cls = "") {
  const pill = document.getElementById("status-pill");
  pill.textContent = text;
  pill.className = cls;
}

function setTurnBar(text, cls = "") {
  const bar = document.getElementById("turn-bar");
  bar.textContent = text;
  bar.className = cls;
}

function applyState(state) {
  currentFen  = state.fen;
  currentTurn = state.turn;
  grid        = fenToGrid(state.fen);
  document.getElementById("info-gameid").textContent = state.game_id || "—";
  document.getElementById("info-move").textContent   = state.fullmove || "—";
  document.getElementById("info-fen").textContent    = state.fen || "—";
  renderBoard();

  const status = state.status;
  if (status === "playing") {
    const myTurn = state.turn === "white";
    setTurnBar(
      myTurn ? "▶ Din tur — klik en brik" : "⏳ Stockfish tænker…",
      myTurn ? "your-turn" : ""
    );
  } else {
    gameOver = true;
    let msg = "";
    if (status === "checkmate")      msg = state.winner === "white" ? "♛ Du vandt — skakmat!" : "♟ Stockfish vandt — skakmat!";
    else if (status === "stalemate") msg = "½–½ Remis — pat";
    else if (status === "draw")      msg = "½–½ Remis";
    else if (status === "resigned")  msg = "Du opgav spillet";
    setTurnBar(msg, "gameover");
    setStatus("SLUT", "gameover");
    log(msg, "er");
    document.getElementById("btn-resign").disabled = true;
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect(afterConnect) {
  if (ws) { ws.close(); ws = null; }
  ws = new WebSocket(WS_URL);
  setStatus("FORBINDER…");

  ws.onopen = () => {
    setStatus("FORBUNDET", "connected");
    log("Forbundet til server");
    if (afterConnect) afterConnect();
  };
  ws.onmessage = (evt) => handleMessage(JSON.parse(evt.data));
  ws.onclose   = () => { setStatus("AFBRUDT", "error"); log("Forbindelse afbrudt", "ee"); ws = null; };
  ws.onerror   = () => { setStatus("FEJL", "error"); log("WebSocket fejl — kører serveren?", "ee"); };
}

function handleMessage(msg) {
  switch (msg.type) {
    case "game_created":
      gameId   = msg.game_id;
      gameOver = false;
      selected = null; lastFrom = null; lastTo = null;
      applyState(msg);
      setStatus("SPILLER", "playing");
      document.getElementById("btn-resign").disabled = false;
      log(`Spil oprettet: ${gameId}`);
      break;
    case "state":
      applyState(msg);
      break;
    case "move":
      lastFrom = msg.from; lastTo = msg.to;
      log(`Stockfish: ${msg.from} → ${msg.to}`, "ea");
      break;
    case "error":
      log(`Fejl: ${msg.message}`, "ee");
      // Ugyldig træk — nulstil valg og sæt bræt tilbage
      selected = null;
      lastFrom = null; lastTo = null;
      renderBoard();
      break;
    case "pong":
      log("pong");
      break;
  }
}

// ── Knapper ───────────────────────────────────────────────────────────────────
document.getElementById("btn-new").addEventListener("click", () => {
  const skill = parseInt(document.getElementById("skill-slider").value);
  document.getElementById("info-skill").textContent = skill;
  gameOver = false;
  connect(() => {
    ws.send(JSON.stringify({
      type: "new_game", mode: "vs_stockfish",
      mac_address: MAC, device_name: "browser-client"
    }));
  });
});

document.getElementById("btn-flip").addEventListener("click", () => {
  flipped = !flipped;
  renderBoard();
});

document.getElementById("btn-resign").addEventListener("click", () => {
  if (!ws || !gameId) return;
  ws.send(JSON.stringify({ type: "resign", game_id: gameId }));
  document.getElementById("btn-resign").disabled = true;
});

document.getElementById("skill-slider").addEventListener("input", (e) => {
  document.getElementById("skill-val").textContent = e.target.value;
});

// ── Init ──────────────────────────────────────────────────────────────────────
grid = fenToGrid(currentFen);
renderBoard();
log("Browser testklient klar — tryk 'Nyt spil'");
</script>
